{{ define "main" }}
<article class="post">
  <header>
    <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
    <h1>{{ .Title }}</h1>
  </header>
  <div class="post-content">
    {{ .Content }}
  </div>
  <nav class="post-nav">
    {{ with .PrevInSection }}<a href="{{ .Permalink }}" class="post-nav-prev">&larr; {{ .Title }}</a>{{ end }}
    {{ with .NextInSection }}<a href="{{ .Permalink }}" class="post-nav-next">{{ .Title }} &rarr;</a>{{ end }}
  </nav>
</article>
{{ end }}
